name: Deploy Fork to Balena

on:
  push:
    branches:
      - master

jobs:
  balena_cloud_build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install Balena CLI
        run: |
          npm install -g balena-cli

      - name: Process Schema and Push
        run: |
          # 1. Log cleanly into your balena dashboard
          balena login --token ${{ secrets.BALENA_TOKEN }}
          
          # 2. Make Anthias's internal deployment builder script executable
          chmod +x ./bin/deploy_to_balena.sh
          
          # 3. Force the script to compile the templates and push directly using the local dev code flag
          ./bin/deploy_to_balena.sh --board pi3 --fleet it71/anthias-pi3 --dev
