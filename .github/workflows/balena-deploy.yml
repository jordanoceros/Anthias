name: Deploy Fork to Balena

on:
  push:
    branches:
      - master

jobs:
  balena_cloud_build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install Balena CLI
        run: |
          npm install -g balena-cli

      - name: Generate Compose Schema and Push to Fleet
        run: |
          # Log into the Balena CLI using your saved secret token
          balena login --token ${{ secrets.BALENA_TOKEN }}
          
          # Make the template deployment script executable
          chmod +x ./bin/deploy_to_balena.sh
          
          # Run the Anthias self-deploy script mapped explicitly to your Pi 3 fleet
          ./bin/deploy_to_balena.sh --board pi3 --fleet it71/anthias-pi3 --dev
