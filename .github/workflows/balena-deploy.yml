name: Deploy Fork to Balena

on:
  push:
    branches:
      - master

jobs:
  balena_cloud_build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install Balena CLI
        run: |
          npm install -g balena-cli

      - name: Process Schema and Push
        run: |
          # Log into your Balena cloud engine cleanly
          balena login --token ${{ secrets.BALENA_TOKEN }}
          
          # Copy the file over 
          cp docker-compose.balena.yml.tmpl docker-compose.yml
          
          # Run a bash sweep to swap the unparsed template tag out for a clean "latest" string
          sed -i 's/${IMAGE_TAG}/latest/g' docker-compose.yml
          
          # Deploy cleanly using native image compilation rules
          balena deploy it71/anthias-pi3 --build
