name: Deploy Fork to Balena

on:
  push:
    branches:
      - master

jobs:
  balena_cloud_build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install Balena CLI
        run: |
          npm install -g balena-cli

      - name: Compile, Sanitize and Deploy
        run: |
          # 1. Log cleanly into your balena account
          balena login --token ${{ secrets.BALENA_TOKEN }}
          
          # 2. Force the root package.json to be version 2.0.0
          node -e "const fs = require('fs'); const pkg = fs.existsSync('package.json') ? JSON.parse(fs.readFileSync('package.json')) : {}; pkg.version = '2.0.0'; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));"
          
          # 3. Explicitly set the deployment context for the fleet engine
          echo "version: '2.0.0'" > balena.yml
          
          # 4. Make the internal script executable
          chmod +x ./bin/deploy_to_balena.sh
          
          # 5. Run the Anthias builder script to handle the native Pi 3 layout and template parsing
          ./bin/deploy_to_balena.sh --board pi3 --fleet it71/anthias-pi3 --dev || true
          
          # 6. SANITIZE: Intercept and convert any fallback 0.0.0 tags generated by the script to 2.0.0
          sed -i -E 's/0.0.0(\+rev[0-9]+)?/2.0.0/g' docker-compose.yml
          
          # 7. SANITIZE: Sweep and replace any remaining raw unparsed ${VARIABLES} with 'latest'
          sed -i -E 's/\$\{[A-Za-z0-9_]+\}/latest/g' docker-compose.yml
          
          # 8. SANITIZE: Fix trailing empty tags ONLY on image configuration lines to prevent syntax crashes
          sed -i -E '/image:/ s/:[[:space:]]*$/:latest/g' docker-compose.yml
          
          # 9. Push the pristine, version-corrected schema using Balena's native emulation engine
          balena deploy it71/anthias-pi3 --emulated
