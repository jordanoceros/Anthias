name: Deploy Fork to Balena

on:
  push:
    branches:
      - master

jobs:
  balena_cloud_build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install Balena CLI
        run: |
          npm install -g balena-cli

      - name: Inject Version and Deploy to BalenaCloud
        run: |
          # 1. Log into your Balena cloud engine
          balena login --token ${{ secrets.BALENA_TOKEN }}
          
          # 2. Force the root package.json to be version 2.0.0
          node -e "const fs = require('fs'); const pkg = JSON.parse(fs.readFileSync('package.json')); pkg.version = '2.0.0'; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));"
          
          # 3. Manually create the required docker-compose from the template
          cp docker-compose.balena.yml.tmpl docker-compose.yml
          
          # 4. Strip out any raw template tags to prevent HTTP 400 validation issues
          sed -i 's/${IMAGE_TAG}/latest/g' docker-compose.yml
          
          # 5. Push via native build, passing the explicit target architecture for the Pi 3
          balena deploy it71/anthias-pi3 --emulated
