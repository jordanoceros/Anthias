name: Deploy Fork to Balena

on:
  push:
    branches:
      - master

jobs:
  balena_cloud_build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install Balena CLI
        run: |
          npm install -g balena-cli

      - name: Compile and Deploy to BalenaCloud
        run: |
          # 1. Log cleanly into your balena account
          balena login --token ${{ secrets.BALENA_TOKEN }}
          
          # 2. Hard-inject version 2.0.0 so balena adopts it as the official release tag
          node -e "const fs = require('fs'); const pkg = JSON.parse(fs.readFileSync('package.json')); pkg.version = '2.0.0'; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));"
          
          # 3. Make the internal script executable
          chmod +x ./bin/deploy_to_balena.sh
          
          # 4. Let Anthias generate the dev deployment schema so it handles the Pi 3 logic natively
          ./bin/deploy_to_balena.sh --board pi3 --fleet it71/anthias-pi3 --dev || true
          
          # 5. SANITIZE: Aggressively sweep and replace any raw ${VARIABLES} the script failed to parse with 'latest'
          sed -i -E 's/\$\{[A-Za-z0-9_]+\}/latest/g' docker-compose.yml
          
          # 6. SANITIZE: Fix any dangling empty tags (e.g., 'image: my-image:') that break the builder
          sed -i -E 's/:[[:space:]]*$/:latest/g' docker-compose.yml
          
          # 7. Push the fully sanitized schema using Balena's native emulation engine
          balena deploy it71/anthias-pi3 --emulated --build
