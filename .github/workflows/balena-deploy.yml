name: Deploy Fork to Balena
on:
  push:
    branches:
      - master
jobs:
  balena_cloud_build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU (ARM emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Patch playwright for armv7l incompatibility
        run: |
          sed -i 's/"playwright==1.59.0"/"playwright==1.59.0; platform_machine != '\''armv7l'\''"/g' pyproject.toml
          sed -i 's/"pytest-playwright==0.7.2"/"pytest-playwright==0.7.2; platform_machine != '\''armv7l'\''"/g' pyproject.toml
          rm -f uv.lock

      - name: Install Balena CLI
        run: npm install -g balena-cli

      - name: Authenticate and Deploy via Anthias Script
        env:
          DOCKER_DEFAULT_PLATFORM: linux/arm/v7
        run: |
          balena login --token ${{ secrets.BALENA_TOKEN }}
          chmod +x ./bin/deploy_to_balena.sh
          ./bin/deploy_to_balena.sh --board pi3 --fleet it71/anthias-pi3 --dev
