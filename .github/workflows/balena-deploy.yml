name: Deploy Fork to Balena

on:
  push:
    branches:
      - master

jobs:
  balena_cloud_build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install Balena CLI
        run: |
          npm install -g balena-cli

      - name: Process Schema and Push Production Release
        run: |
          # 1. Log cleanly into your balena dashboard
          balena login --token ${{ secrets.BALENA_TOKEN }}
          
          # 2. Make the script executable
          chmod +x ./bin/deploy_to_balena.sh
          
          # 3. Use the dev flag script ONLY to safely generate a fully valid docker-compose file 
          # We append '|| true' to bypass the step's internal push command if it errors out at the end
          ./bin/deploy_to_balena.sh --board pi3 --fleet it71/anthias-pi3 --dev || true
          
          # 4. Explicitly push the generated schema to Balena as a hardcoded version 2.0.0 release
          balena deploy it71/anthias-pi3 --build --version 2.0.0
