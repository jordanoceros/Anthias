name: Deploy Fork to Balena

on:
  push:
    branches:
      - master

jobs:
  balena_cloud_build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Deploy to BalenaCloud
        uses: ./.github/actions/balena-deploy
        with:
          balena_token: ${{ secrets.BALENA_TOKEN }}
          fleet: it71/anthias-pi3
          board: pi3
