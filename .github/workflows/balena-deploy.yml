name: Deploy Fork to Balena

on:
  push:
    branches:
      - master

jobs:
  balena_cloud_build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install Balena CLI
        run: |
          npm install -g balena-cli

      - name: Compile and Deploy to BalenaCloud
        run: |
          # 1. Log cleanly into your Balena cloud engine
          balena login --token ${{ secrets.BALENA_TOKEN }}
          
          # 2. Inject version 2.0.0 into package.json so Balena adopts it as the official release tag
          node -e "const fs = require('fs'); const pkg = JSON.parse(fs.readFileSync('package.json')); pkg.version = '2.0.0'; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));"
          
          # 3. Make Anthias's internal script executable
          chmod +x ./bin/deploy_to_balena.sh
          
          # 4. Use their script ONLY to safely generate a fully valid docker-compose file.
          # We append '|| true' so that when its built-in push command fails, the workflow doesn't stop.
          ./bin/deploy_to_balena.sh --board pi3 --fleet it71/anthias-pi3 --dev || true
          
          # 5. Push the perfectly compiled schema using Balena's native ARM emulation engine
          balena deploy it71/anthias-pi3 --emulated
