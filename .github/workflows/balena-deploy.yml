name: Deploy Fork to Balena

on:
  push:
    branches:
      - master

jobs:
  balena_cloud_build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install Balena CLI
        run: |
          npm install -g balena-cli

      - name: Compile and Deploy to BalenaCloud
        run: |
          # 1. Log into your balena account
          balena login --token ${{ secrets.BALENA_TOKEN }}
          
          # 2. Hard-inject version 2.0.0 into package.json so balena adopts it as the official release tag
          node -e "const fs = require('fs'); const pkg = JSON.parse(fs.readFileSync('package.json')); pkg.version = '2.0.0'; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));"
          
          # 3. Manually parse the template file into a valid docker-compose configuration
          cp docker-compose.balena.yml.tmpl docker-compose.yml
          
          # 4. Inject structural fallback tags for the Pi 3 images to fix the platform OS parsing error
          sed -i 's/${IMAGE_TAG}/latest-pi3/g' docker-compose.yml
          sed -i 's/${SERVER_IMAGE}/ghcr.io\/screenly\/anthias-server:latest-pi3/g' docker-compose.yml
          sed -i 's/${VIEWER_IMAGE}/ghcr.io\/screenly\/anthias-viewer:latest-pi3/g' docker-compose.yml
          sed -i 's/${CELERY_IMAGE}/ghcr.io\/screenly\/anthias-celery:latest-pi3/g' docker-compose.yml
          
          # 5. Push the perfectly compiled schema using Balena's native engine
          balena deploy it71/anthias-pi3 --emulated
